# model-map.yaml — Fuente de verdad para "qué modelo corre cada fase".
#
# Doble indirección: fase → tier (capacidad, agnóstico de proveedor) → modelo.
# Lo consumen TANTO Claude Code (craftsman_lead) como opencode (wrapper).
# Cambiar de proveedor = cambiar `active_profile`; el mapa `phase_tiers` no se toca.
# Investigación y justificación honesta: `docs/model-fit.md`.

# Perfil activo. Determina qué proveedor/models se usan.
#   - anthropic    → Claude Code puro (Agent tool, alias opus/sonnet/haiku)
#   - opencode_go  → híbrido: Claude + OpenCode Go (suscripción $10/mes)
active_profile: anthropic

profiles:
  anthropic:
    # tier → modelo. `agent_model` es el alias que acepta la herramienta `Agent`
    # de Claude Code (opus/sonnet/haiku/fable). `id` y `price_in_out` ($/MTok
    # in·out) son para documentación y para el cálculo de coste del banco A/B.
    tiers:
      deep:     { agent_model: opus,   id: claude-opus-4-8,   price_in_out: "5·25" }
      standard: { agent_model: sonnet, id: claude-sonnet-4-6, price_in_out: "3·15" }
      cheap:    { agent_model: haiku,  id: claude-haiku-4-5,  price_in_out: "1·5" }
    # Cadena de degradación si el modelo asignado no está disponible: baja al
    # siguiente tier y REGÍSTRALO (no falles en silencio). Ver craftsman_lead.
    degrade: [deep, standard, cheap]

  opencode_go:
    # Suscripción OpenCode Go ($10/mes). agent_model usa formato provider/model
    # que acepta `opencode run --model`. Los IDs exactos están en docs.go.
    # spec_partner y judge NO tienen modelo Go: caen a Claude vía Agent().
    tiers:
      deep:     { agent_model: anthropic/claude-opus-4-8,           id: claude-opus-4-8 }
      standard: { agent_model: opencode-go/deepseek-v4-pro,        id: deepseek-v4-pro }
      cheap:    { agent_model: opencode-go/deepseek-v4-flash,      id: deepseek-v4-flash }
    degrade: [deep, standard, cheap]

# fase → tier semántico. NO se toca al cambiar de proveedor.
# Justificación por fila en docs/model-fit.md §3.
phase_tiers:
  spec_partner:      deep      # debate de producto/pushback; la calidad compone
  gherkin_author:    standard  # destilación estructurada spec→Gherkin
  tdd_craftsman:     standard  # TDD estricto; los gates lo respaldan
  judge:             deep      # "el review es el juego entero"; nunca abaratar
  mutation_tester:   cheap     # corre la mutación; apenas necesita LLM
  harness_bootstrap: cheap     # detección de stack; casi un script
  cierre:            cheap     # flip de estado (R1): lo hace el lead, sin subagente
  Explore:           cheap     # barrido de lectura

# Overrides por fase: permiten asignar un modelo CONCRETO distinto al que
# le tocaria por tier. Solo se activan si active_profile NO es anthropic.
# Sintaxis: <fase>: { model: <id completo opencode>, provider: <provider> }
# - Si se omite model, se usa el del tier.
# - spec_partner y judge no tienen override: siempre Claude Opus.
phase_overrides:
  gherkin_author:   { model: opencode-go/glm-5.2 }
  tdd_craftsman:    { model: opencode-go/deepseek-v4-pro }
  mutation_tester:  { model: opencode-go/deepseek-v4-flash }
  harness_bootstrap: { model: opencode-go/deepseek-v4-flash }
